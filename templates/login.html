
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">

<style>

/* 🌈 Background */
body {
  background: linear-gradient(135deg, #667eea, #764ba2);
  font-family: 'Poppins', sans-serif;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  margin: 0;
}

/* 🧊 Glass Container */
.container {
  background: rgba(255, 255, 255, 0.1);
  backdrop-filter: blur(15px);
  padding: 30px;
  border-radius: 20px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.2);
  max-width: 400px;
  color: white;
}

/* Heading */
h2 {
  text-align: center;
  font-weight: 600;
  margin-bottom: 20px;
}

/* Inputs */
.form-control {
  background: rgba(255,255,255,0.15);
  border: none;
  color: white;
  border-radius: 10px;
  padding: 10px;
}

.form-control::placeholder {
  color: #ddd;
}

.form-control:focus {
  box-shadow: 0 0 8px #fff;
  background: rgba(255,255,255,0.2);
  color: white;
}

/* Button */
.start-btn {
  background: linear-gradient(135deg, #ff7eb3, #ff758c);
  border: none;
  border-radius: 25px;
  padding: 12px;
  font-size: 16px;
  font-weight: bold;
  transition: 0.3s;
  color: white;
}

.start-btn:hover {
  transform: scale(1.05);
  box-shadow: 0 5px 15px rgba(0,0,0,0.3);
}

/* Password toggle */
#togglePassword {
  position: absolute;
  top: 70%;
  right: 15px;
  cursor: pointer;
}

/* Links */
a {
  color: white;
  text-decoration: underline;
}

/* Animation */
.container {
  animation: fadeIn 0.8s ease;
}

@keyframes fadeIn {
  from {opacity:0; transform: translateY(20px);}
  to {opacity:1; transform: translateY(0);}
}

</style>
</head>

<body>

<div class="container">
  <h2><i class="fas fa-user-lock" id="titleIcon"></i> <span id="formTitle">Student Login</span></h2>

  <!-- ✅ FIXED SINGLE FORM -->
  <form method="POST" action="/login">

    <!-- ROLE SELECTION -->
    <div class="d-flex justify-content-center mb-4">
      <div class="btn-group" role="group" aria-label="Role selection">
        <input type="radio" class="btn-check" name="role" id="studentRole" value="student" autocomplete="off" checked>
        <label class="btn btn-outline-light" for="studentRole">Student</label>

        <input type="radio" class="btn-check" name="role" id="teacherRole" value="teacher" autocomplete="off">
        <label class="btn btn-outline-light" for="teacherRole">Teacher</label>
      </div>
    </div>

    <!-- EMAIL -->
    <div class="mb-3">
      <label>Email</label>
      <input type="email" name="email" class="form-control" required>
    </div>

    <!-- PASSWORD -->
    <div class="mb-3 position-relative">
      <label>Password</label>
      <input type="password" name="password" id="password" class="form-control" required>
      <i class="fas fa-eye" id="togglePassword"></i>
    </div>

    <!-- BUTTON -->
    <button type="submit" class="btn w-100 start-btn">Login</button>
  </form>

  <div class="text-center mt-3">
    Don’t have an account? <a href="signup.html">Sign Up</a>
  </div>
</div>

<script>
// 👁 Toggle Password
const toggle = document.getElementById("togglePassword");
const password = document.getElementById("password");

toggle.addEventListener("click", () => {
  password.type = password.type === "password" ? "text" : "password";
  toggle.classList.toggle("fa-eye");
  toggle.classList.toggle("fa-eye-slash");
});

// Role switch logic
const studentRole = document.getElementById('studentRole');
const teacherRole = document.getElementById('teacherRole');
const formTitle = document.getElementById('formTitle');
const titleIcon = document.getElementById('titleIcon');

studentRole.addEventListener('change', () => {
  if(studentRole.checked) {
    formTitle.innerText = "Student Login";
    titleIcon.className = "fas fa-user-lock";
  }
});

teacherRole.addEventListener('change', () => {
  if(teacherRole.checked) {
    formTitle.innerText = "Teacher Login";
    titleIcon.className = "fas fa-chalkboard-teacher";
  }
});
</script>

</body>
</html>
