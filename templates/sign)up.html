<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Sign Up</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">

<style>

/* 🌈 Modern Background */
body {
  background: linear-gradient(135deg, #667eea, #764ba2);
  font-family: 'Poppins', sans-serif;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  margin: 0;
  padding: 20px;
}

/* 🧊 Glass Card */
.container {
  background: rgba(255, 255, 255, 0.1);
  backdrop-filter: blur(15px);
  padding: 40px;
  border-radius: 20px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.2);
  max-width: 1000px;
  width: 100%;
  color: white;
}

/* Two Column Layout */
.form-wrapper {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 40px;
  align-items: start;
}

.form-left {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

.form-right {
  display: flex;
  flex-direction: column;
  gap: 15px;
}

/* Heading */
h2 {
  text-align: center;
  font-weight: 600;
  margin-bottom: 20px;
}

/* Inputs */
.form-control {
  background: rgba(255,255,255,0.15);
  border: none;
  color: white;
  border-radius: 10px;
  padding: 10px;
}

.form-control::placeholder {
  color: #ddd;
}

.form-control:focus {
  box-shadow: 0 0 8px #fff;
  background: rgba(255,255,255,0.2);
  color: white;
}

/* Button */
.start-btn {
  background: linear-gradient(135deg, #ff7eb3, #ff758c);
  border: none;
  border-radius: 25px;
  padding: 12px;
  font-size: 16px;
  font-weight: bold;
  transition: 0.3s;
}

.start-btn:hover {
  transform: scale(1.05);
  box-shadow: 0 5px 15px rgba(0,0,0,0.3);
}

/* Password icon */
#togglePassword {
  position: absolute;
  top: 70%;
  right: 15px;
  cursor: pointer;
}

/* Image Upload Circle */
#imgWrapper {
  width:90px;
  height:90px;
  border-radius:50%;
  background: rgba(255,255,255,0.2);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:30px;
  margin:auto;
  overflow:hidden;
  cursor:pointer;
  transition:0.3s;
}

#imgWrapper:hover {
  transform: scale(1.1);
}

#previewImg {
  width:100%;
  height:100%;
  object-fit:cover;
  display:none;
}

/* Buttons */
.option-buttons {
  display:flex;
  justify-content:center;
  gap:10px;
  margin-top:10px;
}

.option-buttons button {
  padding:6px 14px;
  border-radius:20px;
  border:none;
  background: rgba(255,255,255,0.2);
  color:white;
  transition:0.3s;
}

.option-buttons button:hover {
  background: white;
  color: black;
}

/* Footer */
a {
  color: #fff;
  text-decoration: underline;
}

/* Role Selection Buttons */
.role-section {
  display: flex;
  justify-content: center;
  gap: 20px;
  margin-bottom: 25px;
  margin-top: 10px;
}

.role-option {
  display: none;
}

.role-label {
  display: inline-block;
  padding: 12px 28px;
  background-color: rgba(255, 255, 255, 0.1);
  color: white;
  border: 3px solid white;
  border-radius: 30px;
  cursor: pointer;
  font-weight: 700;
  font-size: 15px;
  transition: all 0.4s ease;
  user-select: none;
}

.role-label:hover {
  background-color: rgba(255, 255, 255, 0.25);
  transform: translateY(-3px);
  box-shadow: 0 5px 20px rgba(255, 255, 255, 0.4);
}

.role-option:checked + .role-label {
  background-color: white;
  color: #667eea;
  border-color: white;
  box-shadow: 0 8px 25px rgba(255, 255, 255, 0.6);
  transform: scale(1.1);
}

/* Animation */
.container {
  animation: fadeIn 0.8s ease;
}

@keyframes fadeIn {
  from {opacity:0; transform: translateY(20px);}
  to {opacity:1; transform: translateY(0);}
}

/* Responsive Design */
@media (max-width: 768px) {
  .form-wrapper {
    grid-template-columns: 1fr;
    gap: 30px;
  }

  .container {
    max-width: 100%;
    padding: 30px 20px;
  }

  h2 {
    margin-bottom: 25px;
  }
}

</style>
</head>

<body>

<div class="container">
  <h2 style="text-align: center; grid-column: 1 / -1;"><i class="fas fa-user-graduate" id="titleIcon"></i> <span id="formTitle">Student Sign Up</span></h2>

  <form id="signupForm" method="POST" action="/" enctype="multipart/form-data">
    <div class="form-wrapper">
      <!-- LEFT COLUMN: IMAGE AND ROLE -->
      <div class="form-left">
        <!-- ROLE SELECTION -->
        <div class="role-section">
          <input type="radio" class="role-option" name="role" id="studentRole" value="student" checked>
          <label class="role-label" for="studentRole">👨‍🎓 Student</label>

          <input type="radio" class="role-option" name="role" id="teacherRole" value="teacher">
          <label class="role-label" for="teacherRole">👨‍🏫 Teacher</label>
        </div>

        <!-- IMAGE -->
        <div class="text-center mb-3">
          <label>
            <div id="imgWrapper">
              <span id="uploadIcon">📤</span>
              <img id="previewImg">
            </div>
          </label>

          <input type="file" id="profileImage" name="profile_image" accept="image/*" hidden required>

          <div class="option-buttons">
            <button type="button" id="cameraBtn">📷 Camera</button>
            <button type="button" id="galleryBtn">🖼 Gallery</button>
          </div>
        </div>
      </div>

      <!-- RIGHT COLUMN: FORM FIELDS -->
      <div class="form-right">
        <!-- NAME -->
        <div class="mb-3">
          <label>Name</label>
          <input type="text" class="form-control" name="name" required>
        </div>

        <!-- ROLL NO / EMPLOYEE ID -->
        <div class="mb-3" id="idFieldContainer">
          <label id="idLabel">Roll No</label>
          <input type="text" class="form-control" name="rollno" id="idInput" placeholder="Enter your Roll No" required>
        </div>

        <!-- DEPARTMENT -->
        <div class="mb-3">
          <label>Department</label>
          <input type="text" class="form-control" name="department" placeholder="Enter your Department" required>
        </div>

        <!-- DIVISION / DIV -->
        <div class="mb-3">
          <label>Division</label>
          <input type="text" class="form-control" name="div" placeholder="Enter your Division" required>
        </div>

        <!-- EMAIL -->
        <div class="mb-3">
          <label>Email</label>
          <input type="email" id="email" name="email" class="form-control" required>
        </div>

        <!-- PASSWORD -->
        <div class="mb-3 position-relative">
          <label>Password</label>
          <input type="password" id="password" name="password" class="form-control" required>
          <i class="fas fa-eye" id="togglePassword"></i>
        </div>

        <button type="submit" class="btn w-100 start-btn">Sign Up</button>
      </div>
    </div>
  </form>

  <div class="text-center mt-3">
    Already have an account? <a href="/login">Login</a>
  </div>
</div>

<script>
// Toggle password
togglePassword.onclick = () => {
  password.type = password.type === "password" ? "text" : "password";
};

// Image preview
const profileImage = document.getElementById('profileImage');

cameraBtn.onclick = () => {
  profileImage.setAttribute("capture", "environment");
  profileImage.click();
};

galleryBtn.onclick = () => {
  profileImage.removeAttribute("capture");
  profileImage.click();
};

function showPreview(file){
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    previewImg.src = e.target.result;
    previewImg.style.display="block";
    uploadIcon.style.display="none";
  };
  reader.readAsDataURL(file);
}

profileImage.onchange = () => showPreview(profileImage.files[0]);

// Role switch logic
const studentRole = document.getElementById('studentRole');
const teacherRole = document.getElementById('teacherRole');
const formTitle = document.getElementById('formTitle');
const titleIcon = document.getElementById('titleIcon');
const idLabel = document.getElementById('idLabel');
const idInput = document.getElementById('idInput');

studentRole.addEventListener('change', () => {
  if(studentRole.checked) {
    formTitle.innerText = "Student Sign Up";
    titleIcon.className = "fas fa-user-graduate";
    idLabel.innerText = "Roll No";
    idInput.placeholder = "Enter your Roll No";
  }
});

teacherRole.addEventListener('change', () => {
  if(teacherRole.checked) {
    formTitle.innerText = "Teacher Sign Up";
    titleIcon.className = "fas fa-chalkboard-teacher";
    idLabel.innerText = "Teacher ID";
    idInput.placeholder = "Enter your Teacher ID";
  }
});
</script>

</body>
</html>
